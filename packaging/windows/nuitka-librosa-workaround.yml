- module-name: 'librosa.core.fft'
  anti-bloat:
    - description: 'replace librosa FFT shim with Nuitka-safe equivalent'
      module_code: |
        import scipy.fft

        from types import ModuleType
        from typing import Optional
        from ..util.decorators import deprecated

        __all__ = ["get_fftlib", "set_fftlib"]

        class _FFTState:
            current: Optional[ModuleType] = scipy.fft

        _STATE = _FFTState()

        @deprecated(version="0.11.0", version_removed="1.0")
        def set_fftlib(lib: Optional[ModuleType] = None) -> None:
            if lib is None:
                lib = scipy.fft
            _STATE.current = lib

        def get_fftlib() -> ModuleType:
            if _STATE.current is None:
                assert False  # pragma: no cover
            return _STATE.current

- module-name: 'transformers.commands.add_new_model_like'
  anti-bloat:
    - description: 'rewrite generated init template to avoid Nuitka f-string transformation bug'
      replacements_plain:
        ? |-
          imports = "\n            ".join(f"from .{file} import *" for file, to_add in filenames_to_add if to_add)
          init_file = COPYRIGHT + textwrap.dedent(
              f"""
              from typing import TYPE_CHECKING

              from ...utils import _LazyModule
              from ...utils.import_utils import define_import_structure


              if TYPE_CHECKING:
                  {imports}
              else:
                  import sys

                  _file = globals()["__file__"]
                  sys.modules[__name__] = _LazyModule(__name__, _file, define_import_structure(_file), module_spec=__spec__)
              """
          )
          return init_file
        : |-
          imports = "\n            ".join(f"from .{file} import *" for file, to_add in filenames_to_add if to_add)
          init_template = """
          from typing import TYPE_CHECKING

          from ...utils import _LazyModule
          from ...utils.import_utils import define_import_structure


          if TYPE_CHECKING:
          {imports_block}
          else:
              import sys

              _file = globals()["__file__"]
              sys.modules[__name__] = _LazyModule(
                  __name__,
                  _file,
                  define_import_structure(_file),
                  module_spec=__spec__,
              )
          """
          imports_block = textwrap.indent(imports if imports else "pass", " " * 4)
          init_file = COPYRIGHT + textwrap.dedent(init_template.format(imports_block=imports_block))
          return init_file
